---
# ===========================================
# Backup Role - Default Variables
# ===========================================

backup_base_dir: '/var/lib/backups'
local_backup_dir: 'backups'
backup_retention_days: 30

# What to backup
backup_database: true
backup_files: true

# Directories to include in file backup (relative to shared_dir)
backup_file_dirs:
  - uploads
