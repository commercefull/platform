---
# ===========================================
# Nginx Role - Install and Configure
# ===========================================

- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present
  tags: [nginx, setup]

- name: Create SSL directory
  ansible.builtin.file:
    path: /etc/ssl
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [nginx, ssl]

- name: Copy Nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
    backup: yes
    validate: nginx -t -c %s
  notify: Reload Nginx
  tags: [nginx, config]

- name: Copy SSL certificate
  ansible.builtin.copy:
    src: "{{ ssl_cert_src | default('cert.pem') }}"
    dest: '{{ ssl_cert_path }}'
    owner: root
    group: root
    mode: '0644'
    backup: yes
  notify: Reload Nginx
  tags: [nginx, ssl]

- name: Copy SSL private key
  ansible.builtin.copy:
    src: "{{ ssl_key_src | default('key.pem') }}"
    dest: '{{ ssl_key_path }}'
    owner: root
    group: root
    mode: '0600'
    backup: yes
  notify: Reload Nginx
  tags: [nginx, ssl]

- name: Test Nginx configuration
  ansible.builtin.command: nginx -t
  register: nginx_test
  changed_when: false
  failed_when: nginx_test.rc != 0
  tags: [nginx, verify]

- name: Ensure Nginx is running and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: yes
  tags: [nginx, service]
