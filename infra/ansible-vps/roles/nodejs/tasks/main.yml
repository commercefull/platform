---
# ===========================================
# Node.js Role - Install Node.js, PM2, Yarn
# ===========================================

- name: Create NodeSource keyring directory
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'
  tags: [nodejs, setup]

- name: Add NodeSource GPG key (modern signed-by method)
  ansible.builtin.shell: |
    curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource-keyring.gpg
  args:
    creates: /usr/share/keyrings/nodesource-keyring.gpg
  tags: [nodejs, setup]

- name: Add NodeSource repository (signed-by)
  ansible.builtin.apt_repository:
    repo: 'deb [signed-by=/usr/share/keyrings/nodesource-keyring.gpg] https://deb.nodesource.com/node_{{ nodejs_version }}.x nodistro main'
    state: present
    filename: nodesource
  tags: [nodejs, setup]

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: yes
  tags: [nodejs, setup]

- name: Verify Node.js version
  ansible.builtin.command: node --version
  register: node_version_output
  changed_when: false
  tags: [nodejs, verify]

- name: Display Node.js version
  ansible.builtin.debug:
    msg: 'Node.js version: {{ node_version_output.stdout }}'
  tags: [nodejs, verify]

- name: Install PM2 globally
  community.general.npm:
    name: pm2
    global: yes
    state: present
  tags: [nodejs, pm2]

- name: Install Yarn globally
  community.general.npm:
    name: yarn
    global: yes
    state: present
  tags: [nodejs, yarn]

- name: Setup PM2 startup script
  ansible.builtin.shell: |
    pm2 startup systemd -u {{ app_user }} --hp /home/{{ app_user }}
  args:
    creates: /etc/systemd/system/pm2-{{ app_user }}.service
  tags: [nodejs, pm2]
