---
# ===========================================
# Deploy Role - Health Checks
# ===========================================

- name: Wait for application to be ready
  ansible.builtin.wait_for:
    port: '{{ app_port }}'
    host: 127.0.0.1
    delay: 5
    timeout: '{{ health_check_timeout }}'

- name: Health check request
  ansible.builtin.uri:
    url: 'http://127.0.0.1:{{ app_port }}/health'
    method: GET
    status_code: [200, 404]
    timeout: 10
  register: health_check
  ignore_errors: yes

- name: Display health check result
  ansible.builtin.debug:
    msg: "Health check: {{ 'PASSED' if health_check.status == 200 else 'SKIPPED (no /health endpoint)' }}"
