---
# ===========================================
# PostgreSQL Role - Install and Configure
# ===========================================

- name: Create PostgreSQL keyring directory
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'
  tags: [postgres, setup]

- name: Add PostgreSQL GPG key (modern signed-by method)
  ansible.builtin.shell: |
    curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/keyrings/postgresql-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/postgresql-archive-keyring.gpg
  tags: [postgres, setup]

- name: Add PostgreSQL repository (signed-by)
  ansible.builtin.apt_repository:
    repo: 'deb [signed-by=/usr/share/keyrings/postgresql-archive-keyring.gpg] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main'
    state: present
    filename: pgdg
  tags: [postgres, setup]

- name: Install PostgreSQL packages
  ansible.builtin.apt:
    name:
      - 'postgresql-{{ postgres_version }}'
      - 'postgresql-contrib-{{ postgres_version }}'
      - 'postgresql-client-{{ postgres_version }}'
      - python3-psycopg2
    state: present
    update_cache: yes
  tags: [postgres, setup]

- name: Ensure PostgreSQL is running and enabled
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: yes
  tags: [postgres, service]

# SECURITY: Restrict PostgreSQL to localhost only
- name: Configure listen_addresses to localhost only
  ansible.builtin.lineinfile:
    path: '/etc/postgresql/{{ postgres_version }}/main/postgresql.conf'
    regexp: "^#?listen_addresses\\s*="
    line: "listen_addresses = '127.0.0.1'"
    state: present
  notify: Restart PostgreSQL
  tags: [postgres, security]

# SECURITY: Enforce scram-sha-256 password encryption
- name: Set password_encryption to scram-sha-256
  ansible.builtin.lineinfile:
    path: '/etc/postgresql/{{ postgres_version }}/main/postgresql.conf'
    regexp: "^#?password_encryption\\s*="
    line: "password_encryption = 'scram-sha-256'"
    state: present
  notify: Restart PostgreSQL
  tags: [postgres, security]

# SECURITY: Configure pg_hba.conf for secure local-only access
- name: Configure pg_hba.conf - local socket for postgres superuser
  community.postgresql.postgresql_pg_hba:
    dest: '/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf'
    contype: local
    databases: all
    users: postgres
    method: peer
    state: present
  notify: Reload PostgreSQL
  tags: [postgres, security]

- name: Configure pg_hba.conf - local socket for app user
  community.postgresql.postgresql_pg_hba:
    dest: '/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf'
    contype: local
    databases: '{{ db_name }}'
    users: '{{ db_user }}'
    method: scram-sha-256
    state: present
  notify: Reload PostgreSQL
  tags: [postgres, security]

- name: Configure pg_hba.conf - localhost TCP for app user
  community.postgresql.postgresql_pg_hba:
    dest: '/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf'
    contype: host
    databases: '{{ db_name }}'
    users: '{{ db_user }}'
    source: '127.0.0.1/32'
    method: scram-sha-256
    state: present
  notify: Reload PostgreSQL
  tags: [postgres, security]

# SECURITY: Remove overly permissive default rules
- name: Remove default trust rule for local connections
  community.postgresql.postgresql_pg_hba:
    dest: '/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf'
    contype: host
    databases: all
    users: all
    source: '127.0.0.1/32'
    method: trust
    state: absent
  notify: Reload PostgreSQL
  tags: [postgres, security]

- name: Remove default trust rule for IPv6 local connections
  community.postgresql.postgresql_pg_hba:
    dest: '/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf'
    contype: host
    databases: all
    users: all
    source: '::1/128'
    method: trust
    state: absent
  notify: Reload PostgreSQL
  tags: [postgres, security]

- name: Verify PostgreSQL version
  ansible.builtin.command: psql --version
  register: postgres_version_output
  changed_when: false
  tags: [postgres, verify]

- name: Display PostgreSQL version
  ansible.builtin.debug:
    msg: 'PostgreSQL version: {{ postgres_version_output.stdout }}'
  tags: [postgres, verify]
