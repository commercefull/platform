---
# ===========================================
# Common Role - Base System Setup
# ===========================================

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [common, update]

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
  when: upgrade_packages | default(false) | bool
  tags: [common, upgrade]

- name: Install base dependencies
  ansible.builtin.apt:
    name: '{{ common_packages }}'
    state: present
  tags: [common, packages]

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone | default('UTC') }}"
  tags: [common, timezone]

- name: Auto-remove unnecessary packages
  ansible.builtin.apt:
    autoremove: yes
    purge: yes
  tags: [common, cleanup]

# SECURITY: SSH hardening
- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  notify: Restart SSH
  tags: [common, ssh, security]

- name: Disable SSH root login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin"
    line: "PermitRootLogin no"
    state: present
  notify: Restart SSH
  tags: [common, ssh, security]

- name: Disable SSH empty passwords
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitEmptyPasswords"
    line: "PermitEmptyPasswords no"
    state: present
  notify: Restart SSH
  tags: [common, ssh, security]

- name: Set SSH MaxAuthTries
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?MaxAuthTries"
    line: "MaxAuthTries 3"
    state: present
  notify: Restart SSH
  tags: [common, ssh, security]
