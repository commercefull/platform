---
# ===========================================
# Deploy Playbook - Zero-Downtime Deployment
# ===========================================
# Usage:
#   ansible-playbook playbooks/deploy.yml
#   ansible-playbook playbooks/deploy.yml -e "repo_branch=develop"
#   ansible-playbook playbooks/deploy.yml -e "run_migrations=true"
# ===========================================

- name: Deploy Application
  hosts: vps
  become: true
  gather_facts: true

  roles:
    - role: deploy
      tags: [deploy]

  post_tasks:
    - name: Deployment complete
      ansible.builtin.debug:
        msg: |
          To rollback: ansible-playbook playbooks/rollback.yml
      tags: [info]
