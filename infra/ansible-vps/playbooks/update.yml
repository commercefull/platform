---
# ===========================================
# Update Playbook - System Update and Reboot
# ===========================================
# Usage:
#   ansible-playbook playbooks/update.yml
#   ansible-playbook playbooks/update.yml --skip-tags reboot
# ===========================================

- name: Update and Reboot Servers
  hosts: vps
  become: true
  gather_facts: true

  vars:
    upgrade_packages: true

  pre_tasks:
    - name: Check current kernel version
      ansible.builtin.command: uname -r
      register: kernel_before
      changed_when: false
      tags: [update, info]

    - name: Display current kernel version
      ansible.builtin.debug:
        msg: 'Current kernel: {{ kernel_before.stdout }}'
      tags: [update, info]

  roles:
    - role: common
      tags: [update]

  tasks:
    - name: Clean apt cache
      ansible.builtin.apt:
        autoclean: yes
      tags: [update, cleanup]

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required
      tags: [reboot]

    - name: Display reboot status
      ansible.builtin.debug:
        msg: 'Reboot required: {{ reboot_required.stat.exists }}'
      tags: [reboot]

    - name: Reboot the server
      ansible.builtin.reboot:
        reboot_timeout: '{{ reboot_timeout }}'
        msg: 'Rebooting for system updates'
        pre_reboot_delay: 5
        post_reboot_delay: 30
      when: reboot_required.stat.exists
      tags: [reboot]

    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        timeout: '{{ ssh_wait_timeout }}'
        delay: 10
      tags: [reboot]

    - name: Check kernel version after reboot
      ansible.builtin.command: uname -r
      register: kernel_after
      changed_when: false
      tags: [reboot, info]

    - name: Display kernel version comparison
      ansible.builtin.debug:
        msg: 'Kernel: {{ kernel_before.stdout }} -> {{ kernel_after.stdout }}'
      tags: [reboot, info]

  post_tasks:
    - name: Check if PM2 config exists
      ansible.builtin.stat:
        path: '{{ current_link }}/pm2.config.js'
      register: pm2_config
      tags: [services]

    - name: Restart PM2 processes
      ansible.builtin.shell: |
        cd {{ current_link }} && pm2 restart pm2.config.js --update-env
      args:
        executable: /bin/bash
      environment:
        NODE_ENV: '{{ node_env }}'
        PATH: '/usr/bin:/usr/local/bin:{{ ansible_env.PATH }}'
        HOME: '/home/{{ app_user }}'
      become_user: '{{ app_user }}'
      when: pm2_config.stat.exists
      tags: [services, pm2]

    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
      tags: [services, nginx]

    - name: Update summary
      ansible.builtin.debug:
        msg: |
          ✅ Update complete!
          - Kernel: {{ kernel_after.stdout }}
          - Services restarted
      tags: [info]
